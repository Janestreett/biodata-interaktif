<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Biodata Interaktif — Akmal Fahreza</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --bg: #0d2b3e;
    --bg-2: #123a52;
    --panel: #ffffff;
    --ink: #0d2b3e;
    --ink-dim: #5c7284;
    --teal: #1aa6a0;
    --coral: #ff8a65;
    --line: #e3ecf0;
  }

  *{ margin:0; padding:0; box-sizing:border-box; }
  body{
    min-height:100vh;
    background:
      radial-gradient(60% 50% at 15% 10%, rgba(26,166,160,0.35), transparent 60%),
      radial-gradient(50% 40% at 90% 90%, rgba(255,138,101,0.20), transparent 60%),
      linear-gradient(160deg, var(--bg), var(--bg-2));
    color:var(--ink);
    font-family:'Inter', sans-serif;
    display:flex; align-items:center; justify-content:center;
    padding:48px 20px;
  }
  ::selection{ background:var(--teal); color:#fff; }
  :focus-visible{ outline:2px solid var(--teal); outline-offset:3px; }

  .stage{ width:100%; max-width:480px; }

  .intro{ text-align:center; margin-bottom:26px; color:#eaf3f5; }
  .intro .eyebrow{
    font-size:0.76rem; letter-spacing:0.16em; text-transform:uppercase;
    color:var(--coral); font-weight:600; display:block; margin-bottom:10px;
  }
  .intro h1{
    font-family:'Sora', sans-serif; font-size:1.6rem; margin-bottom:8px;
  }
  .intro p{ color:#b9cdd6; font-size:0.9rem; }

  .card{
    background:var(--panel);
    border-radius:20px;
    box-shadow:0 30px 60px rgba(0,0,0,0.30);
    overflow:hidden;
  }

  .card-header{
    background:linear-gradient(135deg, var(--teal), #0e7d78);
    padding:32px 28px;
    color:#fff;
    text-align:center;
    position:relative;
  }
  .avatar{
    width:72px; height:72px; border-radius:50%;
    background:rgba(255,255,255,0.18);
    display:flex; align-items:center; justify-content:center;
    font-family:'Sora', sans-serif; font-size:1.4rem; font-weight:700;
    margin:0 auto 14px;
    border:2px solid rgba(255,255,255,0.4);
  }
  .card-header h2{ font-family:'Sora', sans-serif; font-size:1.1rem; }
  .card-header .role{ font-size:0.82rem; color:#d7f3ef; margin-top:4px; }

  .card-body{ padding:28px; }

  #biodataOutput{ display:flex; flex-direction:column; gap:14px; }

  .row{
    display:flex; justify-content:space-between; align-items:center;
    padding:12px 14px; border-radius:10px; background:#f4f8f9;
    border:1px solid var(--line);
  }
  .row .label{ font-size:0.8rem; color:var(--ink-dim); font-weight:500; }
  .row .value{ font-size:0.92rem; font-weight:600; text-align:right; }

  .placeholder-text{ color:var(--ink-dim); font-size:0.9rem; text-align:center; padding:20px 0; }

  .action-btn{
    width:100%; margin-top:22px; padding:14px; border:none; border-radius:10px;
    background:var(--coral); color:#fff; font-size:0.95rem; font-weight:600; cursor:pointer;
    transition:background .25s ease, transform .25s ease;
  }
  .action-btn:hover{ background:#f2703f; transform:translateY(-2px); }
  .action-btn:active{ transform:translateY(0); }
</style>
</head>
<body>

<div class="stage">
  <div class="intro">
    <span class="eyebrow">Praktik 2 · Biodata Interaktif</span>
    <h1>Kartu Biodata</h1>
    <p>Klik tombol di bawah untuk menampilkan biodata lewat JavaScript.</p>
  </div>

  <div class="card">
    <div class="card-header">
      <h2>Biodata Interaktif</h2>
      <div class="role">Ditampilkan dengan variabel & innerHTML</div>
    </div>
    <div class="card-body">
      <div id="biodataOutput">
        <p class="placeholder-text">Biodata belum ditampilkan.</p>
      </div>
      <button class="action-btn" id="tampilkanBtn">Tampilkan Biodata</button>
    </div>
  </div>
</div>

<script>
  // 1. Variabel biodata
  const nama = "Akmal Fahreza";
  const tempatLahir = "Tangerang Selatan";
  const alamat = "Pamulang, Tangerang Selatan";
  const hobi = "Renang";
  const citaCita = "Investment Banker";

  const btn = document.getElementById('tampilkanBtn');
  const output = document.getElementById('biodataOutput');

  btn.addEventListener('click', function () {
    // 2. Menyusun konten biodata dengan innerHTML
    output.innerHTML = `
      <div class="row"><span class="label">Nama</span><span class="value">${nama}</span></div>
      <div class="row"><span class="label">Tempat Lahir</span><span class="value">${tempatLahir}</span></div>
      <div class="row"><span class="label">Alamat</span><span class="value">${alamat}</span></div>
      <div class="row"><span class="label">Hobi</span><span class="value">${hobi}</span></div>
      <div class="row"><span class="label">Cita-cita</span><span class="value">${citaCita}</span></div>
    `;
    btn.textContent = "Tampilkan Ulang";
  });
</script>

</body>
</html>
